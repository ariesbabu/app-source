# tekton/pipeline.yaml
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-pipeline
  namespace: default
spec:
  description: "Pipeline to build and push container images for Flux CD"
  params:
    - name: git-url
      description: The Git repository URL
      type: string
    - name: git-revision
      description: The Git revision to build
      type: string
      default: main
    - name: image
      description: The full image name (registry/repo)
      type: string
    - name: dockerfile
      description: Path to the Dockerfile
      type: string
      default: ./Dockerfile
  workspaces:
    - name: shared-workspace
      description: Workspace shared between tasks
  tasks:
    # Task 1: Clone the repository
    - name: clone-repo
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: shared-workspace

    # Task 2: Build and push the image
    - name: build-image
      taskRef:
        name: kaniko-build
      runAfter:
        - clone-repo
      params:
        - name: image
          value: $(params.image)
        - name: dockerfile
          value: $(params.dockerfile)
      workspaces:
        - name: source
          workspace: shared-workspace