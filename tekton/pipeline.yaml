apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: app-build-deploy
  namespace: ci
spec:
  params:
    - name: IMAGE_TAG
    - name: GIT_SHA
    - name: BUILD_TIME
    - name: GITHUB_TOKEN
  workspaces:
    - name: source-ws
    - name: gitops-ws
  tasks:
    - name: git-clone-app
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: source-ws
      params:
        - name: url
          value: https://github.com/ariesbabu/app-source.git
        - name: revision
          value: main

    - name: kaniko-build-push
      runAfter: [git-clone-app]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: build-push
            image: gcr.io/kaniko-project/executor:latest
            securityContext:
              runAsUser: 0  # Keep this; it's valid for a Step
            workingDir: /workspace/source
            args:
              - --dockerfile=Dockerfile
              - --context=dir:///workspace/source
              - --destination=harbor.apj-cxrules.win/lab/my-app:$(params.IMAGE_TAG)
              - --insecure
              - --insecure-pull
              - --skip-tls-verify
            volumeMounts:
              - name: docker-config
                mountPath: /kaniko/.docker/config.json
                subPath: .dockerconfigjson
        volumes:
          - name: docker-config
            secret:
              secretName: harbor-robot-creds
      workspaces:
        - name: source
          workspace: source-ws

    - name: update-gitops-tag
      runAfter: [kaniko-build-push]
      taskSpec:
        workspaces:
          - name: gitops-ws
        steps:
          - name: update-logic
            image: alpine/git:latest
            securityContext:
              runAsUser: 0
            script: |
              git clone https://$(params.GITHUB_TOKEN)@github.com/ariesbabu/gitops-config.git /workspace/gitops-ws
              cd /workspace/gitops-ws
              sed -i 's|harbor.apj-cxrules.win/lab/my-app:.*|harbor.apj-cxrules.win/lab/my-app:$(params.IMAGE_TAG) # {"$imagepolicy": "flux-system:my-app"}|' apps/base/deployment.yaml
              git config user.email "tekton@lab.internal"
              git config user.name "Tekton"
              git add -A
              git commit -m "chore: deploy my-app:$(params.IMAGE_TAG)"
              git push origin main
      workspaces:
        - name: gitops-ws
          workspace: gitops-ws