apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: app-source-template
  namespace: tekton-pipelines
spec:
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: app-build-deploy-run-
        namespace: ci
      spec:
        pipelineRef:
          name: app-build-deploy
        serviceAccountName: tekton-sa
        params:
          - name: IMAGE_TAG
            value: "v1.0.1"
          - name: GIT_SHA
            value: "abc1234"
          - name: BUILD_TIME
            value: "2026-04-16"
          - name: GITHUB_TOKEN
            value: $(secret.github-pat.token)
        workspaces:
          - name: source-ws
            volumeClaimTemplate:
              spec:
                accessModes: 
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          - name: gitops-ws
            emptyDir: {}
        # MOVE THE FIX HERE: taskRunTemplate covers everything
        taskRunTemplate:
          podTemplate:
            securityContext:
              runAsUser: 0      # Explicitly run as root
              runAsGroup: 0     # Group root
              fsGroup: 0        # Workspace ownership root
            # If your cluster is very strict, add this:
            # stepTemplate:
            #   securityContext:
            #     runAsUser: 0