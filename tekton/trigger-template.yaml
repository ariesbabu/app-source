apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: app-source-template
  namespace: tekton-pipelines
spec:
  params:
    - name: git-sha
      description: The full commit SHA from the GitHub push event
    - name: git-ref
      description: The git ref (e.g. refs/heads/main)
    - name: build-time
      description: Build timestamp (provided by Tekton)

  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: app-build-deploy-run-
        namespace: ci
      spec:
        pipelineRef:
          name: app-build-deploy
        serviceAccountName: tekton-sa
        params:
          # Recommended dynamic IMAGE_TAG (short SHA + timestamp)
          - name: IMAGE_TAG
            value: "$(tt.params.git-sha)"

          - name: GIT_SHA
            value: "$(tt.params.git-sha)"

          - name: BUILD_TIME
            value: "$(tt.params.build-time:yyyy-MM-dd HH:mm:ss)"

          # GITHUB_TOKEN is NO longer passed here (it's injected via secretKeyRef in the task)
        workspaces:
          - name: source-ws
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          - name: gitops-ws
            emptyDir: {}
        taskRunTemplate:
          podTemplate:
            securityContext:
              fsGroup: 0