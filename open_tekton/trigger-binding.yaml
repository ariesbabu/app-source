apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: app-github-binding
  namespace: tekton-pipelines
spec:
  params:
    - name: git_sha
      value: $(body.head_commit.id)
    - name: repo_url
      value: $(body.repository.clone_url)
    - name: branch
      value: $(body.ref)
    - name: short_sha
      value: $(body.head_commit.id[0:7])